# ═════════════════════════════════════════════════════════════════════
# THE ARCADE — Snake contribution game
#
# Generates the snake animation into ./dist and publishes it to the
# `output` branch, keeping main's history clean.
#
# Consumed by README.md via:
#   https://raw.githubusercontent.com/<user>/<user>/output/github-snake.svg
#   https://raw.githubusercontent.com/<user>/<user>/output/github-snake-dark.svg
#
# Actions used (actively maintained as of 2026):
#   · Platane/snk — the original snake, SVG-only fast variant
#   · crazy-max/ghaction-github-pages — battle-tested branch publisher
# ═════════════════════════════════════════════════════════════════════
name: arcade

on:
  schedule:
    # Once a day at 00:30 UTC (06:00 IST) — fresh contributions, fresh game
    - cron: "30 0 * * *"
  workflow_dispatch: {}      # manual "insert coin" button
  push:
    branches: [main]         # regenerate on profile updates too

permissions:
  contents: write            # needed to push the output branch

jobs:
  arcade:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # ── SNAKE ──────────────────────────────────────────────────────
      # Brutalist palette: acid-yellow contribution ramp, pink snake
      # (dark) / black snake on yellow ramp (light).
      - name: Generate snake game
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?color_snake=#000000&color_dots=#ebedf0,#fff3a3,#ffe95c,#ffde00,#d1b000
            dist/github-snake-dark.svg?color_snake=#FF90E8&color_dots=#161b22,#4d4300,#8f7c00,#c4ab00,#ffde00

      # ── Publish to the output branch ───────────────────────────────
      - name: Push snake to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
