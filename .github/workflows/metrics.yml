# ═════════════════════════════════════════════════════════════════════
# METRICS — lowlighter/metrics, terminal template
#
# Renders a text-mode "system report" card (perfectly on-theme for a
# brutalist README) and commits it to the `metrics` branch so daily
# regenerations never pollute main's history.
#
# Consumed by README.md via:
#   https://raw.githubusercontent.com/<user>/<user>/metrics/metrics.svg
#
# REQUIRED SECRET — METRICS_TOKEN:
#   A classic PAT with `public_repo` + `read:user` scopes.
#   Settings → Developer settings → Personal access tokens → classic.
#   Then add it: repo Settings → Secrets and variables → Actions.
# ═════════════════════════════════════════════════════════════════════
name: metrics

on:
  schedule:
    # Twice a day — metrics move slower than games
    - cron: "0 1,13 * * *"
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Render metrics.svg (terminal template)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ${{ github.repository_owner }}

          # Output: commit metrics.svg to its own quiet branch
          filename: metrics.svg
          output_action: commit
          committer_branch: metrics
          committer_message: "chore: update metrics [skip ci]"

          # The terminal template = green-on-black system report
          template: terminal
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata
