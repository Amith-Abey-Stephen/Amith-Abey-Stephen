<!--
  ═══════════════════════════════════════════════════════════════════
  HERO BANNER — DARK MODE — NEO-BRUTALISM
  Hand-built animated SVG. No scripts, no external assets, no PNGs.

  Design system:
    · Square corners everywhere. Borders 2.5–3px.
    · Hard offset shadows (acid pink on dark, never blurred).
    · Acid palette: #FFDE00 #FF90E8 #ADFF2F #00F0FF #FF4911
    · Type: Arial Black for display, ui-monospace for everything else.

  Layers:
    1. Top marquee tape (textLength-locked seamless loop)
    2. Rotated eyebrow sticker
    3. Giant two-line display name with hard pink shadow
    4. Terminal typing box (4 rotating phrases, steps() typing)
    5. Sticker chips that slam in
    6. Square avatar plate + starburst sticker + barcode
    7. Bottom hazard-stripe tape (crawling stripes)
  ═══════════════════════════════════════════════════════════════════
-->
<svg width="1200" height="470" viewBox="0 0 1200 470" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Amith Abey Stephen — Full Stack Developer, Kerala, India">
  <title>AMITH ABEY STEPHEN — FULL-STACK DEVELOPER</title>

  <defs>
    <clipPath id="tapeTop"><rect x="0" y="0" width="1200" height="34"/></clipPath>
    <clipPath id="tapeBottom"><rect x="0" y="436" width="1200" height="34"/></clipPath>
  </defs>

  <style>
    .display { font-family: 'Arial Black', 'Archivo Black', 'Helvetica Neue', Arial, sans-serif; font-weight: 900; }
    .mono    { font-family: ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace; }

    /* ── Rotating typed phrases: 4 slots × 5s = one 20s loop ── */
    .phrase { font-size: 16px; fill: #ffffff; }
    .t0 { animation: t0 20s linear infinite; }
    .t1 { animation: t1 20s linear infinite; }
    .t2 { animation: t2 20s linear infinite; }
    .t3 { animation: t3 20s linear infinite; }
    @keyframes t0 {
      0%        { clip-path: inset(-20% 100% -20% 0); opacity: 1; animation-timing-function: steps(28, end); }
      8%        { clip-path: inset(-20% -2% -20% 0);  opacity: 1; }
      22%       { clip-path: inset(-20% -2% -20% 0);  opacity: 1; }
      24%, 100% { clip-path: inset(-20% -2% -20% 0);  opacity: 0; }
    }
    @keyframes t1 {
      0%, 24.9% { clip-path: inset(-20% 100% -20% 0); opacity: 0; }
      25%       { clip-path: inset(-20% 100% -20% 0); opacity: 1; animation-timing-function: steps(28, end); }
      33%       { clip-path: inset(-20% -2% -20% 0);  opacity: 1; }
      47%       { clip-path: inset(-20% -2% -20% 0);  opacity: 1; }
      49%, 100% { clip-path: inset(-20% -2% -20% 0);  opacity: 0; }
    }
    @keyframes t2 {
      0%, 49.9% { clip-path: inset(-20% 100% -20% 0); opacity: 0; }
      50%       { clip-path: inset(-20% 100% -20% 0); opacity: 1; animation-timing-function: steps(28, end); }
      58%       { clip-path: inset(-20% -2% -20% 0);  opacity: 1; }
      72%       { clip-path: inset(-20% -2% -20% 0);  opacity: 1; }
      74%, 100% { clip-path: inset(-20% -2% -20% 0);  opacity: 0; }
    }
    @keyframes t3 {
      0%, 74.9% { clip-path: inset(-20% 100% -20% 0); opacity: 0; }
      75%       { clip-path: inset(-20% 100% -20% 0); opacity: 1; animation-timing-function: steps(28, end); }
      83%       { clip-path: inset(-20% -2% -20% 0);  opacity: 1; }
      97%       { clip-path: inset(-20% -2% -20% 0);  opacity: 1; }
      99%, 100% { clip-path: inset(-20% -2% -20% 0);  opacity: 0; }
    }

    /* Blocky blink — no easing, ever */
    .blink { animation: blink 1s step-end infinite; }
    @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }

    /* Stickers slam in with zero grace */
    .sticker { opacity: 0; animation: slam 0.25s steps(2, end) forwards; transform-box: fill-box; transform-origin: center; }
    @keyframes slam { from { opacity: 0; transform: scale(1.6); } to { opacity: 1; transform: scale(1); } }
  </style>

  <!-- ══ 1 · TOP MARQUEE TAPE ══ -->
  <rect x="0" y="0" width="1200" height="34" fill="#000000"/>
  <g clip-path="url(#tapeTop)">
    <g>
      <!-- textLength locks each copy to exactly 1000px → seamless loop -->
      <text x="0"    y="23" class="mono" font-size="14" font-weight="bold" letter-spacing="1" fill="#ffffff" textLength="1000" lengthAdjust="spacingAndGlyphs">FULL-STACK DEVELOPER ✦ PRODUCT BUILDER ✦ AI-POWERED COMMERCE ✦ SHOPIFY APPS ✦ LOCAL LLMS ✦ IOT ✦ </text>
      <text x="1000" y="23" class="mono" font-size="14" font-weight="bold" letter-spacing="1" fill="#ffffff" textLength="1000" lengthAdjust="spacingAndGlyphs">FULL-STACK DEVELOPER ✦ PRODUCT BUILDER ✦ AI-POWERED COMMERCE ✦ SHOPIFY APPS ✦ LOCAL LLMS ✦ IOT ✦ </text>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="-1000 0" dur="16s" repeatCount="indefinite"/>
    </g>
  </g>
  <rect x="1" y="1" width="1198" height="32" fill="none" stroke="#ffffff" stroke-width="2"/>

  <!-- ══ 2 · EYEBROW STICKER ══ -->
  <g transform="translate(64 58) rotate(-1.2)">
    <rect x="4" y="4" width="330" height="30" fill="#FF90E8"/>
    <rect x="0" y="0" width="330" height="30" fill="#FFDE00" stroke="#000000" stroke-width="2.5"/>
    <text x="14" y="20" class="mono" font-size="12.5" font-weight="bold" letter-spacing="1.5" fill="#000000">KERALA, INDIA · FULL-STACK DEVELOPER</text>
  </g>

  <!-- ══ 3 · DISPLAY NAME (hard pink shadow, zero blur) ══ -->
  <text x="70" y="196" class="display" font-size="82" fill="#FF90E8">AMITH ABEY</text>
  <text x="64" y="190" class="display" font-size="82" fill="#ffffff">AMITH ABEY</text>
  <text x="70" y="288" class="display" font-size="82" fill="#FF90E8">STEPHEN</text>
  <text x="64" y="282" class="display" font-size="82" fill="#ffffff">STEPHEN</text>
  <!-- punctuation block after the name, blinking like a cursor -->
  <rect x="474" y="252" width="18" height="18" fill="#ADFF2F" stroke="#000000" stroke-width="2" class="blink"/>

  <!-- spinning deco star -->
  <text x="640" y="140" class="display" font-size="38" fill="#FFDE00" transform-box="fill-box" transform-origin="center">✦
    <animateTransform attributeName="transform" type="rotate" from="0 652 128" to="360 652 128" dur="12s" repeatCount="indefinite"/>
  </text>
  <!-- scattered registration marks -->
  <text x="600" y="330" class="mono" font-size="18" fill="#ffffff" opacity="0.35">+</text>
  <text x="760" y="90"  class="mono" font-size="18" fill="#ffffff" opacity="0.35">+</text>
  <text x="700" y="240" class="mono" font-size="18" fill="#ffffff" opacity="0.35">+</text>

  <!-- ══ 4 · TERMINAL TYPING BOX ══ -->
  <g transform="translate(64 308)">
    <rect x="5" y="5" width="560" height="44" fill="#ADFF2F"/>
    <rect x="0" y="0" width="560" height="44" fill="#000000" stroke="#ffffff" stroke-width="2.5"/>
    <text x="16" y="29" class="mono" font-size="17" font-weight="bold" fill="#ADFF2F">❯</text>
    <rect x="32" y="14" width="9" height="18" fill="#ADFF2F" class="blink"/>
    <g>
      <text x="52" y="29" class="mono phrase t0">BUILDING AI-POWERED COMMERCE</text>
      <text x="52" y="29" class="mono phrase t1">SHIPPING SHOPIFY APPS PEOPLE LOVE</text>
      <text x="52" y="29" class="mono phrase t2">RUNNING LLMS ON HARDWARE I OWN</text>
      <text x="52" y="29" class="mono phrase t3">TEACHING MICROCONTROLLERS NEW TRICKS</text>
    </g>
  </g>

  <!-- ══ 5 · STICKER CHIPS ══ -->
  <g class="sticker" style="animation-delay:0.20s" transform="translate(64 376) rotate(-2)">
    <rect x="3" y="3" width="118" height="34" fill="#000000" stroke="#ffffff" stroke-width="1"/>
    <rect x="0" y="0" width="118" height="34" fill="#FFDE00" stroke="#000000" stroke-width="2.5"/>
    <text x="59" y="22" text-anchor="middle" class="mono" font-size="12.5" font-weight="bold" fill="#000000">AGENTIC AI</text>
  </g>
  <g class="sticker" style="animation-delay:0.35s" transform="translate(196 376) rotate(1.5)">
    <rect x="3" y="3" width="132" height="34" fill="#000000" stroke="#ffffff" stroke-width="1"/>
    <rect x="0" y="0" width="132" height="34" fill="#FF90E8" stroke="#000000" stroke-width="2.5"/>
    <text x="66" y="22" text-anchor="middle" class="mono" font-size="12.5" font-weight="bold" fill="#000000">SHOPIFY APPS</text>
  </g>
  <g class="sticker" style="animation-delay:0.50s" transform="translate(342 376) rotate(-1)">
    <rect x="3" y="3" width="118" height="34" fill="#000000" stroke="#ffffff" stroke-width="1"/>
    <rect x="0" y="0" width="118" height="34" fill="#ADFF2F" stroke="#000000" stroke-width="2.5"/>
    <text x="59" y="22" text-anchor="middle" class="mono" font-size="12.5" font-weight="bold" fill="#000000">LOCAL LLMS</text>
  </g>
  <g class="sticker" style="animation-delay:0.65s" transform="translate(474 376) rotate(2)">
    <rect x="3" y="3" width="118" height="34" fill="#000000" stroke="#ffffff" stroke-width="1"/>
    <rect x="0" y="0" width="118" height="34" fill="#00F0FF" stroke="#000000" stroke-width="2.5"/>
    <text x="59" y="22" text-anchor="middle" class="mono" font-size="12.5" font-weight="bold" fill="#000000">DX TOOLING</text>
  </g>
  <g class="sticker" style="animation-delay:0.80s" transform="translate(606 376) rotate(-1.5)">
    <rect x="3" y="3" width="132" height="34" fill="#000000" stroke="#ffffff" stroke-width="1"/>
    <rect x="0" y="0" width="132" height="34" fill="#FF4911" stroke="#000000" stroke-width="2.5"/>
    <text x="66" y="22" text-anchor="middle" class="mono" font-size="12.5" font-weight="bold" fill="#000000">IOT HARDWARE</text>
  </g>

  <!-- ══ 6 · AVATAR PLATE ══ -->
  <!-- hard shadow -->
  <rect x="894" y="74" width="210" height="210" fill="#FF90E8"/>
  <!-- plate -->
  <rect x="886" y="66" width="210" height="210" fill="#000000" stroke="#ffffff" stroke-width="3"/>
  <text x="991" y="180" text-anchor="middle" class="display" font-size="26" letter-spacing="1" fill="#ffffff">AMITH<tspan fill="#FFDE00">.SITE</tspan></text>
  <!-- corner starburst sticker (wobbles) -->
  <g transform-box="fill-box" transform-origin="center">
    <polygon points="878,28 888,52 912,44 902,66 926,74 902,82 912,104 888,96 878,120 868,96 844,104 854,82 830,74 854,66 844,44 868,52"
      fill="#FF4911" stroke="#000000" stroke-width="2.5"/>
    <text x="878" y="79" text-anchor="middle" class="mono" font-size="9.5" font-weight="bold" fill="#ffffff">ONLINE</text>
    <animateTransform attributeName="transform" type="rotate" values="-8 878 74; 8 878 74; -8 878 74" dur="3s" repeatCount="indefinite"/>
  </g>
  <!-- status square -->
  <rect x="1078" y="258" width="18" height="18" fill="#ADFF2F" stroke="#000000" stroke-width="2.5" class="blink"/>
  <!-- barcode -->
  <g transform="translate(886 296)">
    <rect x="0" y="0" width="120" height="22" fill="#ffffff" stroke="#000000" stroke-width="2"/>
    <g fill="#000000">
      <rect x="6"  y="4" width="2" height="14"/><rect x="11" y="4" width="4" height="14"/>
      <rect x="18" y="4" width="2" height="14"/><rect x="24" y="4" width="5" height="14"/>
      <rect x="32" y="4" width="2" height="14"/><rect x="37" y="4" width="3" height="14"/>
      <rect x="43" y="4" width="6" height="14"/><rect x="52" y="4" width="2" height="14"/>
      <rect x="57" y="4" width="4" height="14"/><rect x="64" y="4" width="2" height="14"/>
      <rect x="69" y="4" width="5" height="14"/><rect x="77" y="4" width="2" height="14"/>
      <rect x="82" y="4" width="3" height="14"/><rect x="88" y="4" width="6" height="14"/>
      <rect x="97" y="4" width="2" height="14"/><rect x="102" y="4" width="4" height="14"/>
      <rect x="109" y="4" width="2" height="14"/>
    </g>
  </g>
  <text x="1014" y="312" class="mono" font-size="11" font-weight="bold" fill="#ffffff">EST.2021</text>

  <!-- ══ 7 · BOTTOM HAZARD TAPE (crawling stripes) ══ -->
  <rect x="0" y="436" width="1200" height="34" fill="#000000"/>
  <g clip-path="url(#tapeBottom)">
    <!-- one path = 52 parallelogram stripes; shifting by one 26px period loops seamlessly -->
    <path fill="#FFDE00" d="M0 436 h16 l-10 34 h-16 z m26 0 h16 l-10 34 h-16 z m26 0 h16 l-10 34 h-16 z m26 0 h16 l-10 34 h-16 z m26 0 h16 l-10 34 h-16 z m26 0 h16 l-10 34 h-16 z m26 0 h16 l-10 34 h-16 z m26 0 h16 l-10 34 h-16 z m26 0 h16 l-10 34 h-16 z m26 0 h16 l-10 34 h-16 z m26 0 h16 l-10 34 h-16 z m26 0 h16 l-10 34 h-16 z m26 0 h16 l-10 34 h-16 z m26 0 h16 l-10 34 h-16 z m26 0 h16 l-10 34 h-16 z m26 0 h16 l-10 34 h-16 z m26 0 h16 l-10 34 h-16 z m26 0 h16 l-10 34 h-16 z m26 0 h16 l-10 34 h-16 z m26 0 h16 l-10 34 h-16 z m26 0 h16 l-10 34 h-16 z m26 0 h16 l-10 34 h-16 z m26 0 h16 l-10 34 h-16 z m26 0 h16 l-10 34 h-16 z m26 0 h16 l-10 34 h-16 z m26 0 h16 l-10 34 h-16 z m26 0 h16 l-10 34 h-16 z m26 0 h16 l-10 34 h-16 z m26 0 h16 l-10 34 h-16 z m26 0 h16 l-10 34 h-16 z m26 0 h16 l-10 34 h-16 z m26 0 h16 l-10 34 h-16 z m26 0 h16 l-10 34 h-16 z m26 0 h16 l-10 34 h-16 z m26 0 h16 l-10 34 h-16 z m26 0 h16 l-10 34 h-16 z m26 0 h16 l-10 34 h-16 z m26 0 h16 l-10 34 h-16 z m26 0 h16 l-10 34 h-16 z m26 0 h16 l-10 34 h-16 z m26 0 h16 l-10 34 h-16 z m26 0 h16 l-10 34 h-16 z m26 0 h16 l-10 34 h-16 z m26 0 h16 l-10 34 h-16 z m26 0 h16 l-10 34 h-16 z m26 0 h16 l-10 34 h-16 z m26 0 h16 l-10 34 h-16 z m26 0 h16 l-10 34 h-16 z m26 0 h16 l-10 34 h-16 z m26 0 h16 l-10 34 h-16 z">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="-26 0" dur="0.7s" repeatCount="indefinite"/>
    </path>
  </g>
  <rect x="1" y="437" width="1198" height="32" fill="none" stroke="#ffffff" stroke-width="2"/>
</svg>
