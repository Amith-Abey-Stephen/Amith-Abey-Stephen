  <rect x="886" y="66" width="210" height="210" fill="#ffffff" stroke="#000000" stroke-width="3"/>
  <text x="991" y="180" text-anchor="middle" class="display" font-size="26" letter-spacing="1" fill="#000000">AMITH<tspan fill="#D6008F">.SITE</tspan></text>
