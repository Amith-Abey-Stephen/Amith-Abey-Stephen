  <text x="760" y="90"  class="mono" font-size="18" fill="#000000" opacity="0.3">+</text>
  <text x="700" y="240" class="mono" font-size="18" fill="#000000" opacity="0.3">+</text>

  <!-- ══ TERMINAL TYPING BOX (a terminal stays black) ══ -->
  <g transform="translate(64 308)">
    <rect x="5" y="5" width="560" height="44" fill="#000000"/>
    <rect x="0" y="0" width="560" height="44" fill="#000000" stroke="#000000" stroke-width="2.5"/>
