  <text x="30" y="204" class="out" style="animation-delay:3.9s"><tspan class="key">BACKEND   </tspan><tspan class="dim">→ </tspan>node.js · express · php</text>
  <text x="30" y="226" class="out" style="animation-delay:4.1s"><tspan class="key">DATABASE  </tspan><tspan class="dim">→ </tspan>mongodb · postgresql · mysql · firebase</text>
