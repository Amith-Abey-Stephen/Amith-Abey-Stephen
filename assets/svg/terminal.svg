  <!-- ══ Footer strip inside window ══ -->
  <rect x="2" y="622" width="860" height="22" fill="#FFDE00"/>
  <text x="432" y="637" text-anchor="middle" font-size="10.5" font-weight="bold" letter-spacing="2" fill="#000000">TIP: THIS ENTIRE TERMINAL IS ONE HAND-WRITTEN SVG · NO JAVASCRIPT WAS HARMED</text>
</svg>
