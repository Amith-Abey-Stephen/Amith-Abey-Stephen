  <rect x="43" y="18" width="13" height="13" fill="#FFDE00" stroke="#ffffff" stroke-width="1.5"/>
  <rect x="66" y="18" width="13" height="13" fill="#ADFF2F" stroke="#ffffff" stroke-width="1.5"/>
  <text x="432" y="31" text-anchor="middle" font-size="12.5" font-weight="bold" letter-spacing="1.5" fill="#ffffff">AMITH@KERALA: ~/PROJECTS — ZSH</text>

