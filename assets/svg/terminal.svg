<!--
  ═══════════════════════════════════════════════════════════════════
  INTERACTIVE TERMINAL — NEO-BRUTALISM
  Plays a full shell session on load. A terminal is black on every
  theme, so one file serves dark AND light GitHub (hard shadow is
  acid pink so it reads on both).

  Timeline (~13s, one-shot, ends on a blinking prompt):
    0.5s  $ whoami
    2.6s  $ skills  (by category)
    5.2s  $ projects  (featured)
    7.8s  $ current_status
   10.0s  $ contact
   12.0s  $ ▊  (idle prompt, blinks forever)

  Techniques:
    · Commands "type" via clip-path inset() + steps() easing
    · Outputs print via staggered opacity steps (animation-delay)
    · No scripts, no external assets — safe for GitHub's camo proxy
  ═══════════════════════════════════════════════════════════════════
-->
<svg width="874" height="656" viewBox="0 0 874 656" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Terminal session: whoami, skills, projects, current status and contact for Amith Abey Stephen">
  <title>AMITH@KERALA — ZSH</title>

  <style>
    text {
      font-family: ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace;
      font-size: 13.5px;
      fill: #ffffff;
      white-space: pre;
    }
    .dim  { fill: #ffffff; opacity: 0.55; }
    .key  { fill: #FFDE00; }
    .name { fill: #FF90E8; }
    .ok   { fill: #ADFF2F; }
    .cyan { fill: #00F0FF; }

    /* Typed command lines */
    .cmd {
      clip-path: inset(-20% 100% -20% 0);
      animation: type 0.9s steps(24, end) forwards;
    }
    @keyframes type {
      from { clip-path: inset(-20% 100% -20% 0); }
      to   { clip-path: inset(-20% -2% -20% 0); }
    }

    /* Printed output lines — hard steps, no fade */
    .out { opacity: 0; animation: print 0.15s steps(2, end) forwards; }
    @keyframes print { from { opacity: 0; } to { opacity: 1; } }

    /* Idle prompt cursor — appears at 12s, blinks forever */
    .cursor { opacity: 0; animation: blink 1s step-end 12s infinite; }
    @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
  </style>

  <!-- ══ Hard shadow + window ══ -->
  <rect x="12" y="12" width="860" height="642" fill="#FF90E8"/>
