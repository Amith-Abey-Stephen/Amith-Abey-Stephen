  <text x="30" y="106" class="out" style="animation-delay:1.5s"><tspan fill="#FFDE00" font-weight="bold">AMITH ABEY STEPHEN</tspan><tspan class="dim"> — full-stack developer · product builder</tspan></text>
  <text x="30" y="128" class="out dim" style="animation-delay:1.7s">kerala, india · shipping things on the internet &amp; occasionally soldering them</text>

