<!-- ICON · HEART — open source. Two-step heartbeat. -->
<svg width="28" height="28" viewBox="0 0 28 28" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="">
  <style>
    .beat { transform-box: fill-box; transform-origin: center; animation: beat 1.2s steps(2, end) infinite; }
    @keyframes beat { 0% { transform: scale(1); } 30% { transform: scale(1.18); } 60%, 100% { transform: scale(1); } }
  </style>
  <rect x="1.5" y="1.5" width="25" height="25" fill="#FF90E8" stroke="#000000" stroke-width="2"/>
  <path class="beat" d="M14 21.5 C10 18 6.5 15 6.5 11.5 A3.8 3.8 0 0 1 14 10 A3.8 3.8 0 0 1 21.5 11.5 C21.5 15 18 18 14 21.5 Z" fill="#000000"/>
</svg>
