<!-- ICON · DISC — on rotation. Vinyl spins (notch shows motion). -->
<svg width="28" height="28" viewBox="0 0 28 28" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="">
  <rect x="1.5" y="1.5" width="25" height="25" fill="#00F0FF" stroke="#000000" stroke-width="2"/>
  <g>
    <circle cx="14" cy="14" r="8.5" fill="#000000"/>
    <circle cx="14" cy="14" r="5.5" fill="none" stroke="#00F0FF" stroke-width="0.8" opacity="0.6"/>
    <circle cx="14" cy="14" r="2.2" fill="#00F0FF"/>
    <rect x="13" y="5.5" width="2" height="3" fill="#00F0FF"/>
    <animateTransform attributeName="transform" type="rotate" from="0 14 14" to="360 14 14" dur="2.4s" repeatCount="indefinite"/>
  </g>
</svg>
