<!-- ICON · CHART — github dashboard. Bars step through heights. -->
<svg width="28" height="28" viewBox="0 0 28 28" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="">
  <rect x="1.5" y="1.5" width="25" height="25" fill="#00F0FF" stroke="#000000" stroke-width="2"/>
  <rect x="6.5" y="14" width="4" height="8" fill="#000000">
    <animate attributeName="y" values="14;11;14" dur="2s" calcMode="discrete" repeatCount="indefinite"/>
    <animate attributeName="height" values="8;11;8" dur="2s" calcMode="discrete" repeatCount="indefinite"/>
  </rect>
  <rect x="12" y="9" width="4" height="13" fill="#000000">
    <animate attributeName="y" values="9;13;9" dur="2s" calcMode="discrete" begin="0.4s" repeatCount="indefinite"/>
    <animate attributeName="height" values="13;9;13" dur="2s" calcMode="discrete" begin="0.4s" repeatCount="indefinite"/>
  </rect>
  <rect x="17.5" y="12" width="4" height="10" fill="#000000">
    <animate attributeName="y" values="12;7;12" dur="2s" calcMode="discrete" begin="0.8s" repeatCount="indefinite"/>
    <animate attributeName="height" values="10;15;10" dur="2s" calcMode="discrete" begin="0.8s" repeatCount="indefinite"/>
  </rect>
</svg>
